version: "3.9"

services:
  # --- BACKEND BOT ---
  bot:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: postgres
      DB_NAME: tbot_db
      DB_USER: admin
      DB_PASS: admin123
      MASTER_KEY: default_master_key_32_chars_long_!!
      JWT_SECRET: default_jwt_secret_pulse_2026
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN} # Única variable obligatoria
      APP_DOMAIN: ${APP_DOMAIN}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/chat
    depends_on:
      - postgres

  # --- BASE DE DATOS ---
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: tbot_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  # --- CEREBRO IA (n8n) ---
  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: tbot_db
      DB_POSTGRESDB_USER: admin
      DB_POSTGRESDB_PASSWORD: admin123
      N8N_WEBHOOK_SECRET: default_n8n_secret
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
