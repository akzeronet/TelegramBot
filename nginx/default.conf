server {
    listen 80;
    server_name _;
    # Redirige todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Seguridad básica ---
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # -------------------------------------------------------------------------
    # /webhook/ → PHP (entrada de mensajes de Telegram)
    # Telegram envía los updates de bots aquí.
    # -------------------------------------------------------------------------
    location /webhook/ {
        proxy_pass         http://php:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 20M;  # Para archivos enviados por usuarios
    }

    # -------------------------------------------------------------------------
    # /api/ → PHP (API REST para Web App futura)
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://php:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    # -------------------------------------------------------------------------
    # /n8n/ → Panel de administración de n8n
    # Protegido por HTTP Basic Auth de n8n (configurado en docker-compose).
    # Restringir por IP en producción es altamente recomendado.
    # -------------------------------------------------------------------------
    location /n8n/ {
        # RECOMENDADO: descomenta y ajusta para restringir por IP del admin
        # allow 123.456.789.0;
        # deny all;

        proxy_pass         http://n8n:5678/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Bloquea acceso directo a archivos sensibles
    location ~ /\. {
        deny all;
    }
}
